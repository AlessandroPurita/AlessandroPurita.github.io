<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulazione TEST ITA-L2 CISIA</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --primary-hover: #004085;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2D3748;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --success-color: #2F855A;
            --success-bg: #C6F6D5;
            --error-color: #9B2C2C;
            --error-bg: #FED7D7;
            --warning-bg: #FEFCBF;
            --warning-border: #ECC94B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding-bottom: 60px;
        }

        /* Barra Superiore Fissa */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        #timer {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        /* Contenitore Principale */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Box Risultati */
        #risultato {
            display: none;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #risultato h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1A202C;
        }

        #risultato p {
            font-size: 1.1rem;
            margin: 5px 0;
        }

        /* Sezioni d'Esame */
        .sezione-esame {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }

        /* Box Testo di Lettura */
        .testo-lettura {
            background-color: #FFFDF5;
            border-left: 4px solid #D69E2E;
            border-radius: 4px;
            padding: 25px;
            margin: 25px 0;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .testo-lettura h3, .testo-lettura h4 {
            color: #B7791F;
            margin-bottom: 15px;
            font-size: 1.15rem;
        }

        .testo-lettura p {
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: justify;
            white-space: pre-line;
        }

        /* Singola Domanda */
        .blocco-domanda {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .blocco-domanda p {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 15px;
        }

        /* Opzioni di Risposta (Radio Button customizzati) */
        .opzioni-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opzione {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            background-color: #FAFAFA;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        .opzione:hover {
            background-color: #EDF2F7;
            border-color: #CBD5E0;
        }

        .opzione input[type="radio"] {
            margin-top: 4px;
            transform: scale(1.1);
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        /* Bottone di Consegna */
        .azione-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .btn-invia {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-invia:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-invia:active {
            transform: translateY(1px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .sezione-esame {
                padding: 15px;
            }
            .testo-lettura {
                padding: 15px;
            }
        }
		/* Aggiungi queste classi in fondo al tag <style> esistente di index.html */

.btn-nav {
    background-color: #6c757d;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
}

.btn-nav:hover {
    background-color: #5a6268;
}

/* Stile per le Textbox all'interno dei Microtesti */
.input-spazio {
    width: 65px;
    padding: 4px 8px;
    margin: 0 4px;
    border: 2px solid #007bff;
    border-radius: 4px;
    font-weight: bold;
    text-align: center;
    font-size: 1rem;
    color: #0056b3;
    background-color: #fff;
    text-transform: uppercase; /* Forza visivamente l'output in maiuscolo */
}

.input-spazio:focus {
    outline: none;
    background-color: #e6f0fa;
    border-color: #004085;
    box-shadow: 0 0 4px rgba(0,123,255,0.5);
}

.box-aiuto-opzioni {
    background-color: #edf2f7;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    padding: 15px;
    margin-top: 15px;
    font-size: 0.95rem;
}

.badge-livello {
    display: inline-block;
    background-color: #e2e8f0;
    color: #4a5568;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 15px;
    text-transform: uppercase;
}
    </style>
</head>
<body>

<header>
    <h2>CISIA ITA-L2 - Simulazione d'Esame Completa</h2>
    <div id="timer">Tempo Rimasto: <span id="tempo">30:00</span></div>
</header>

<div class="container">
    <div id="risultato"></div>

    <form id="form-esame">
        <div id="contenitore-esame">
            <!-- Gestito interamente da app.js -->
        </div>
        
        <div class="azione-container" style="margin-top: 40px; display: flex; justify-content: space-between; width: 100%;">
            <!-- Bottoni dinamici generati da aggiornaBottoniNavigazione() -->
        </div>
    </form>
</div>

<!-- Importazione dei componenti script nell'ordine corretto -->
<script src="domande.js"></script>
<script src="app.js"></script>
</body>
</html>
